<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>シナリオエディタ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;background:#f5f2ea;overflow:hidden;height:100dvh}
#app{width:100%;height:100dvh;display:flex}
#ba{flex:1;position:relative;overflow:hidden;background:#f5f2ea;min-width:0;cursor:default}
#gcvs{position:absolute;inset:0;pointer-events:none;z-index:0}
#svgl{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none}
#svgl.erase-mode{pointer-events:all;cursor:crosshair}
#brd{position:absolute;top:0;left:0;z-index:2;transform-origin:0 0}

/* ボードセレクタ（左上） */
#board-bar{position:absolute;top:8px;left:8px;z-index:101;display:flex;align-items:center;gap:6px}
#board-sel-wrap{position:relative}
#board-sel-btn{background:#fff;border:1.5px solid #2d5a3d;border-radius:10px;padding:4px 10px;font-size:11px;font-weight:700;color:#1e3a28;cursor:pointer;display:flex;align-items:center;gap:5px;user-select:none;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#board-sel-btn:hover{background:#c5dfc9}
#board-dropdown{display:none;position:absolute;top:28px;left:0;background:#fff;border:1.5px solid #2d5a3d;border-radius:10px;z-index:300;min-width:180px;box-shadow:0 4px 12px rgba(0,0,0,.12);overflow:hidden}
#board-dropdown.open{display:block}
.board-opt{padding:8px 12px;font-size:11px;font-weight:600;color:#1e3a28;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px}
.board-opt:hover{background:#e8efe9}
.board-opt.active{background:#d0e8d8}
.board-del{font-size:10px;color:#999;cursor:pointer;padding:1px 4px;border-radius:4px;flex-shrink:0}
.board-del:hover{background:#ffdddd;color:#e05030}
#board-add-row{padding:7px 10px;border-top:1px solid #2d5a3d22;display:flex;gap:5px;align-items:center}
#board-new-input{flex:1;border:1px solid #2d5a3d66;border-radius:6px;padding:4px 6px;font-size:11px;color:#1e3a28;outline:none;font-family:inherit}
#board-new-input:focus{border-color:#2d5a3d}
#board-new-btn{background:#2d5a3d;color:#f5f2ea;border:none;border-radius:6px;padding:4px 8px;font-size:11px;font-weight:700;cursor:pointer}

/* ツールバー */
#tb{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:4px;background:#e8efe9;border:1.5px solid #2d5a3d;border-radius:16px;padding:5px 9px;align-items:center;white-space:nowrap;box-shadow:0 2px 8px rgba(45,90,61,.15)}
.tb-b{background:#fff;border:1px solid #2d5a3d;border-radius:12px;padding:3px 8px;font-size:11px;cursor:pointer;color:#1e3a28;display:flex;align-items:center;gap:3px;font-weight:600;line-height:1.2;transition:background .15s;user-select:none;-webkit-user-select:none}
.tb-b:hover{background:#c5dfc9}
.tb-b.on{background:#2d5a3d;color:#f5f2ea}
.sp{width:1px;height:16px;background:#2d5a3d55;flex-shrink:0}

/* カラーボタン */
.cbtn{width:16px;height:16px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;flex-shrink:0;transition:border-color .15s}
.cbtn.on{border-color:#1e3a28}
#color-add-btn{width:16px;height:16px;border-radius:50%;cursor:pointer;border:1.5px solid #2d5a3d;background:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;color:#2d5a3d;font-weight:700;flex-shrink:0;user-select:none;line-height:1}
#color-add-btn:hover{background:#c5dfc9}
#color-picker-inp{position:absolute;width:0;height:0;opacity:0;pointer-events:none}

/* 線スタイル */
#ls-wrap{position:relative;display:flex;align-items:center}
#ls-btn{background:#fff;border:1px solid #2d5a3d;border-radius:8px;padding:2px 6px;cursor:pointer;display:flex;align-items:center;gap:3px;height:22px;user-select:none}
#ls-btn:hover{background:#c5dfc9}
#ls-dropdown{display:none;position:absolute;top:26px;left:0;background:#fff;border:1px solid #2d5a3d;border-radius:8px;z-index:200;overflow:hidden;min-width:48px;box-shadow:0 2px 8px rgba(0,0,0,.12)}
#ls-dropdown.open{display:block}
.ls-opt{padding:4px 8px;cursor:pointer;display:flex;align-items:center;justify-content:center;height:26px}
.ls-opt:hover{background:#c5dfc9}

/* ズーム */
#zw{position:absolute;bottom:24px;left:8px;z-index:100;display:flex;flex-direction:column;gap:2px;align-items:center}
.zm-b{width:26px;height:26px;border-radius:5px;background:#e8efe9;border:1.5px solid #2d5a3d;color:#1e3a28;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;user-select:none}
.zm-b:hover{background:#c5dfc9}
#zlbl{font-size:9px;color:#1e3a28;font-weight:700;text-align:center;margin-top:1px}

/* 同期インジケータ */
#sync-dot{position:absolute;top:8px;right:8px;z-index:100;display:flex;align-items:center;gap:5px;font-size:10px;color:#1e3a28;font-weight:600;background:rgba(232,239,233,.9);padding:3px 8px;border-radius:12px;border:1px solid #2d5a3d33}
.dot{width:7px;height:7px;border-radius:50%;background:#aaa;flex-shrink:0}
.dot.ok{background:#2d9a3d}
.dot.err{background:#e05030}
.dot.sync{background:#f0a030;animation:blink .6s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* サイドバー */
#sb{width:40%;flex-shrink:0;background:#f9f7f1;border-left:1.5px solid #2d5a3d;display:flex;flex-direction:column;z-index:200;transition:width .2s,opacity .18s;overflow:hidden}
#sb.col{width:0;opacity:0;border-left:none}
#tog{position:absolute;right:0;top:50%;transform:translateY(-50%);z-index:300;width:16px;height:40px;background:#e8efe9;border:1.5px solid #2d5a3d;border-right:none;border-radius:5px 0 0 5px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:#1e3a28;font-weight:700;user-select:none}
#sbh{padding:8px 12px 6px;border-bottom:1px solid #2d5a3d44;font-size:11px;color:#1e3a28;font-weight:700;flex-shrink:0}
.fl{font-size:10px;color:#1e3a28;padding:5px 12px 2px;font-weight:700;flex-shrink:0;display:block}
#ft{margin:0 12px;border:1px solid #2d5a3d66;border-radius:5px;padding:5px 7px;font-size:12px;background:#fff;color:#1e3a28;font-family:inherit;outline:none;flex-shrink:0;display:block;width:calc(100% - 24px)}
#ft:focus{border-color:#2d5a3d}
#fs{display:block;margin:0 12px;width:calc(100% - 24px);border:1px solid #2d5a3d66;border-radius:5px;padding:3px 7px;font-size:11px;background:#fff;color:#1e3a28;font-family:inherit;outline:none;resize:none;flex-shrink:0;line-height:16px;height:22px;overflow:hidden;max-height:22px}
#fs:focus{border-color:#2d5a3d}
#fb{display:block;margin:0 12px;width:calc(100% - 24px);border:1px solid #2d5a3d66;border-radius:5px;padding:6px 7px;font-size:11px;background:#fff;color:#1e3a28;font-family:inherit;outline:none;resize:none;flex:1;min-height:50px;line-height:1.6}
#fb:focus{border-color:#2d5a3d}
#nos{padding:28px 12px;text-align:center;font-size:11px;color:#4a7a55;line-height:1.9;flex-shrink:0}
#edf{flex:1;display:none;flex-direction:column;overflow:hidden;min-height:0}
#edf.vis{display:flex}

/* 付箋 */
.sw{position:absolute}
.sw.sel .si{outline:2px solid #2d5a3d;outline-offset:1px}
.si{border-radius:7px;overflow:hidden;user-select:none;-webkit-user-select:none;box-shadow:0 2px 5px rgba(45,90,61,.12);display:flex;flex-direction:column;height:100%;position:relative;cursor:grab}
.si:active{cursor:grabbing}
.stb{padding:4px 7px 3px;font-size:10px;font-weight:600;flex-shrink:0;display:flex;justify-content:space-between;align-items:center}
.ssc{padding:3px 7px;font-size:9px;flex-shrink:0;border-top:1px solid rgba(0,0,0,.09);line-height:1.4;opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sbd{padding:3px 7px 4px;font-size:10px;flex:1;overflow:hidden;line-height:1.45;word-break:break-all;white-space:pre-wrap}
.dlb{width:14px;height:14px;border-radius:50%;background:rgba(0,0,0,.16);border:none;cursor:pointer;font-size:9px;align-items:center;justify-content:center;flex-shrink:0;display:none;font-weight:700;line-height:1}
.sw:hover .dlb{display:flex}
.rh{position:absolute;right:0;bottom:0;width:14px;height:14px;cursor:se-resize;z-index:20;display:flex;align-items:flex-end;justify-content:flex-end;padding:2px}
.rh::after{content:'';width:6px;height:6px;border-right:2px solid rgba(0,0,0,.25);border-bottom:2px solid rgba(0,0,0,.25);border-radius:1px}

/* ダイアログ */
#dlg{position:absolute;inset:0;z-index:500;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center}
#dlg.show{display:flex}
#dlg-box{background:#f9f7f1;border:1.5px solid #2d5a3d;border-radius:10px;padding:20px 22px;min-width:220px;text-align:center}
#dlg-box p{font-size:12px;color:#1e3a28;font-weight:600;margin-bottom:14px;line-height:1.6}
.dlg-btns{display:flex;gap:8px;justify-content:center}
.dlg-btn{padding:5px 16px;border-radius:7px;font-size:11px;cursor:pointer;font-weight:600;border:1px solid #2d5a3d;user-select:none}
#dlg-ok{background:#2d5a3d;color:#f5f2ea;border:none}
#dlg-no{background:#fff;color:#1e3a28}
#hint{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-size:9px;color:#1e3a28;background:rgba(232,239,233,.95);padding:2px 9px;border-radius:16px;border:1px solid #2d5a3d44;white-space:nowrap;pointer-events:none;font-weight:500}

@media(max-width:600px){
  #sb{width:100%;position:absolute;bottom:0;left:0;height:320px;border-left:none;border-top:1.5px solid #2d5a3d;z-index:300}
  #sb.col{width:100%;height:0;opacity:0;border-top:none}
  #tog{top:auto;bottom:100%;right:8px;transform:none;border-radius:5px 5px 0 0;border-bottom:none;border-right:1.5px solid #2d5a3d;width:40px;height:16px}
  #sync-dot{font-size:9px;padding:2px 6px;top:56px;right:4px}
  #tb{flex-wrap:wrap;top:4px;left:4px;right:4px;transform:none;width:calc(100% - 8px);border-radius:12px;gap:6px;padding:6px 10px;justify-content:center}
  #tb .sp{display:none}
  .tb-b{padding:5px 12px;font-size:13px}
  .cbtn{width:22px;height:22px}
  #color-add-btn{width:22px;height:22px;font-size:14px}
  #ls-btn{height:28px;padding:3px 8px}
  #board-bar{top:auto;bottom:335px;left:6px}
  #zw{bottom:330px}
  .zm-b{width:32px;height:32px;font-size:14px}
  #hint{bottom:328px;font-size:8px}
}
</style>
</head>
<body>
<div id="app">
  <div id="ba">
    <canvas id="gcvs"></canvas>

    <!-- ボードセレクタ -->
    <div id="board-bar">
      <div id="board-sel-wrap">
        <div id="board-sel-btn" role="button">📁 <span id="board-name-lbl">ボード</span> ▾</div>
        <div id="board-dropdown">
          <div id="board-list"></div>
          <div id="board-add-row">
            <input id="board-new-input" type="text" placeholder="新しいボード名...">
            <div id="board-new-btn" role="button">追加</div>
          </div>
        </div>
      </div>
    </div>

    <div id="tb">
      <div class="tb-b" id="badd" role="button" tabindex="0" title="付箋を追加 [Shift++]">＋付箋</div>
      <div class="sp"></div>
      <div id="color-row" style="display:flex;gap:4px;align-items:center">
        <div class="cbtn on" data-c="yellow" style="background:#FFF3B0" role="button" title="黄"></div>
        <div class="cbtn" data-c="blue" style="background:#B5D4F4" role="button" title="青"></div>
        <div class="cbtn" data-c="pink" style="background:#F4C0D1" role="button" title="ピンク"></div>
        <div class="cbtn" data-c="green" style="background:#C0DD97" role="button" title="緑"></div>
        <div class="cbtn" data-c="purple" style="background:#CECBF6" role="button" title="紫"></div>
        <div id="color-add-btn" role="button" title="色を追加">＋</div>
        <input type="color" id="color-picker-inp" value="#ff9999">
      </div>
      <div class="sp"></div>
      <div class="tb-b" id="bcon" role="button" tabindex="0" title="線を引く [Shift+L]">線</div>
      <div id="ls-wrap">
        <div id="ls-btn" role="button" tabindex="0" title="線の種類">
          <svg id="ls-preview" width="32" height="10" viewBox="0 0 32 10"></svg>
          <span style="font-size:9px;color:#1e3a28;font-weight:700;margin-left:1px">▾</span>
        </div>
        <div id="ls-dropdown">
          <div class="ls-opt" data-ls="solid"><svg width="36" height="10" viewBox="0 0 36 10"><line x1="2" y1="5" x2="34" y2="5" stroke="#2d5a3d" stroke-width="1.5"/></svg></div>
          <div class="ls-opt" data-ls="dashed"><svg width="36" height="10" viewBox="0 0 36 10"><line x1="2" y1="5" x2="34" y2="5" stroke="#2d5a3d" stroke-width="1.5" stroke-dasharray="5,3"/></svg></div>
          <div class="ls-opt" data-ls="thick"><svg width="36" height="10" viewBox="0 0 36 10"><line x1="2" y1="5" x2="34" y2="5" stroke="#2d5a3d" stroke-width="3.5"/></svg></div>
        </div>
      </div>
      <div class="tb-b" id="berase" role="button" tabindex="0" title="線を1本消去">🧹</div>
      <div class="tb-b" id="bclr" role="button" tabindex="0" title="線を全削除">🗑</div>
    </div>

    <div id="sync-dot"><div class="dot" id="dot"></div><span id="sync-lbl">接続中...</span></div>
    <div id="zw">
      <div class="zm-b" id="bzi" role="button" tabindex="0">＋</div>
      <div class="zm-b" id="bzo" role="button" tabindex="0">－</div>
      <div class="zm-b" id="bzr" role="button" tabindex="0" style="font-size:8px">100%</div>
      <div id="zlbl">100%</div>
    </div>
    <svg id="svgl">
      <defs>
        <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#2d5a3d"/></marker>
        <marker id="arr2" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#2d5a3d"/></marker>
      </defs>
      <g id="lns"></g>
      <line id="pvl" stroke="#2d5a3d" stroke-width="1.5" stroke-dasharray="5,4" style="display:none" marker-end="url(#arr)"/>
    </svg>
    <div id="brd"></div>
    <div id="tog" role="button" tabindex="0">◀</div>
    <div id="dlg">
      <div id="dlg-box">
        <p>すべての線を削除しますか？</p>
        <div class="dlg-btns">
          <div class="dlg-btn" id="dlg-no" role="button">キャンセル</div>
          <div class="dlg-btn" id="dlg-ok" role="button">削除する</div>
        </div>
      </div>
    </div>
    <div id="hint">背景ドラッグ：移動 ／ ピンチ or Ctrl+スクロール：ズーム ／ Shift++：付箋 ／ Shift+L：線</div>
  </div>

  <div id="sb">
    <div id="sbh">📝 付箋エディタ</div>
    <div id="nos">付箋をクリックして<br>編集を始めましょう</div>
    <div id="edf">
      <span class="fl">題名</span>
      <input id="ft" type="text" placeholder="シーンタイトル...">
      <span class="fl" style="padding-top:6px">シーン説明</span>
      <textarea id="fs" placeholder="場所・状況..."></textarea>
      <span class="fl" style="padding-top:6px">会話・詳細</span>
      <textarea id="fb" placeholder="セリフ、イベント、フラグ条件など..."></textarea>
    </div>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import{getDatabase,ref,onValue,set,get,remove}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";
const firebaseConfig={apiKey:"AIzaSyAdcSEQQye4iLvedks5mKCrlp2aPdm3EBA",authDomain:"scenarioeditor-0301.firebaseapp.com",databaseURL:"https://scenarioeditor-0301-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"scenarioeditor-0301",storageBucket:"scenarioeditor-0301.firebasestorage.app",messagingSenderId:"253159871608",appId:"1:253159871608:web:4d4e9c2da28e3b583ac98d"};
const fbApp=initializeApp(firebaseConfig);
const db=getDatabase(fbApp);

// ===== ボード管理 =====
const META_KEY='scenario_boards_meta';
let boards={};      // {id:{name,ts}}
let curBoardId='default';
let boardUnsub=null;

function metaRef(){return ref(db,'boards_meta');}
function boardDataRef(bid){return ref(db,'boards/'+bid);}
function lsKey(bid){return 'scenario_board_'+bid;}

function saveMeta(){
  try{localStorage.setItem(META_KEY,JSON.stringify(boards));}catch(e){}
  if(navigator.onLine)set(metaRef(),boards).catch(()=>{});
}
function loadMetaLocal(){try{const d=localStorage.getItem(META_KEY);return d?JSON.parse(d):null;}catch(e){return null;}}

function renderBoardList(){
  const list=document.getElementById('board-list');
  list.innerHTML='';
  Object.entries(boards).sort((a,b)=>(a[1].ts||0)-(b[1].ts||0)).forEach(([bid,bdata])=>{
    const row=document.createElement('div');
    row.className='board-opt'+(bid===curBoardId?' active':'');
    const name=document.createElement('span');
    name.textContent=bdata.name||bid;
    name.style.flex='1';
    row.appendChild(name);
    if(Object.keys(boards).length>1){
      const del=document.createElement('div');
      del.className='board-del';del.textContent='✕';del.title='削除';
      del.addEventListener('click',e=>{e.stopPropagation();deleteBoard(bid);});
      row.appendChild(del);
    }
    row.addEventListener('click',()=>switchBoard(bid));
    list.appendChild(row);
  });
}

function switchBoard(bid){
  if(bid===curBoardId){document.getElementById('board-dropdown').classList.remove('open');return;}
  curBoardId=bid;
  document.getElementById('board-name-lbl').textContent=boards[bid]?.name||bid;
  document.getElementById('board-dropdown').classList.remove('open');
  renderBoardList();
  loadBoard(bid);
}

function addBoard(name){
  const id='b'+Date.now();
  boards[id]={name:name.trim()||'新しいボード',ts:Date.now()};
  saveMeta();
  renderBoardList();
  switchBoard(id);
}

function deleteBoard(bid){
  if(!confirm('「'+boards[bid]?.name+'」を削除しますか？\nこのボードのデータはすべて消えます。'))return;
  delete boards[bid];
  saveMeta();
  try{localStorage.removeItem(lsKey(bid));}catch(e){}
  if(navigator.onLine)remove(boardDataRef(bid)).catch(()=>{});
  // 別のボードに切り替え
  const remaining=Object.keys(boards);
  if(remaining.length===0){boards['default']={name:'ボード1',ts:Date.now()};saveMeta();}
  switchBoard(Object.keys(boards)[0]);
  renderBoardList();
}

// ボードセレクタUI
document.getElementById('board-sel-btn').addEventListener('click',e=>{e.stopPropagation();document.getElementById('board-dropdown').classList.toggle('open');});
document.addEventListener('click',()=>document.getElementById('board-dropdown').classList.remove('open'));
document.getElementById('board-new-btn').addEventListener('click',e=>{e.stopPropagation();const inp=document.getElementById('board-new-input');if(inp.value.trim())addBoard(inp.value);inp.value='';});
document.getElementById('board-new-input').addEventListener('keydown',e=>{if(e.key==='Enter'){e.stopPropagation();const inp=e.target;if(inp.value.trim())addBoard(inp.value);inp.value=';}});

// ===== カスタムカラー =====
// デフォルトプリセット
const DEFAULT_COLORS=[
  {id:'yellow',bg:'#FFF3B0',bar:'#ffe873',tx:'#4a3d00'},
  {id:'blue',bg:'#B5D4F4',bar:'#85B7EB',tx:'#0a3a6e'},
  {id:'pink',bg:'#F4C0D1',bar:'#ED93B1',tx:'#621838'},
  {id:'green',bg:'#C0DD97',bar:'#97C459',tx:'#1e4008'},
  {id:'purple',bg:'#CECBF6',bar:'#AFA9EC',tx:'#2e2470'},
];
let customColors=[]; // [{id,bg,bar,tx}]

function colorsKey(){return 'scenario_custom_colors';}
function loadCustomColors(){try{const d=localStorage.getItem(colorsKey());return d?JSON.parse(d):[];}catch(e){return[];}}
function saveCustomColors(){try{localStorage.setItem(colorsKey(),JSON.stringify(customColors));}catch(e){}}

function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return{r,g,b};}
function relativeLuminance(hex){const {r,g,b}=hexToRgb(hex);const toLinear=c=>{c/=255;return c<=0.04045?c/12.92:Math.pow((c+0.055)/1.055,2.4);};return 0.2126*toLinear(r)+0.7152*toLinear(g)+0.0722*toLinear(b);}
function deriveBarColor(hex){// 少し暗くする
  const {r,g,b}=hexToRgb(hex);return '#'+[r,g,b].map(v=>Math.max(0,Math.round(v*0.88)).toString(16).padStart(2,'0')).join('');}
function deriveTxColor(hex){return relativeLuminance(hex)>0.4?'#1e3a28':'#f5f2ea';}

function addCustomColor(hex){
  const id='c'+hex.replace('#','');
  if(customColors.find(c=>c.id===id)||DEFAULT_COLORS.find(c=>c.bg===hex))return;
  const bar=deriveBarColor(hex);const tx=deriveTxColor(hex);
  customColors.push({id,bg:hex,bar,tx});
  saveCustomColors();
  renderColorBtns();
  selectColor(id);
}

function allColors(){return [...DEFAULT_COLORS,...customColors];}
function getColDef(id){return allColors().find(c=>c.id===id)||DEFAULT_COLORS[0];}

function renderColorBtns(){
  const row=document.getElementById('color-row');
  // 既存のcbtnを全削除（color-add-btnは残す）
  row.querySelectorAll('.cbtn').forEach(b=>b.remove());
  const addBtn=document.getElementById('color-add-btn');
  allColors().forEach(c=>{
    const btn=document.createElement('div');
    btn.className='cbtn'+(selCol===c.id?' on':'');
    btn.dataset.c=c.id;
    btn.style.background=c.bg;
    btn.role='button';
    btn.addEventListener('click',()=>selectColor(c.id));
    row.insertBefore(btn,addBtn);
  });
}

function selectColor(id){
  selCol=id;
  document.querySelectorAll('.cbtn').forEach(b=>{b.classList.toggle('on',b.dataset.c===id);});
}

function setSyncState(s){dotEl.className='dot '+s;syncLbl.textContent=s==='ok'?'同期済み':s==='sync'?'保存中...':s==='err'?'接続エラー':'オフライン（保存中）';}

// ===== オフライン対応同期 =====
function getLocalData(bid){try{const d=localStorage.getItem(lsKey(bid));return d?JSON.parse(d):null;}catch(e){return null;}}
function saveLocal(bid){try{localStorage.setItem(lsKey(bid),JSON.stringify({stickies:ST.map(s=>({...s})),lines:LN.map(l=>({...l})),idc,ts:Date.now()}));}catch(e){}}

function loadData(data){
  remoteUpdate=true;
  document.querySelectorAll('.sw').forEach(w=>w.remove());
  ST=[];LN=[];selId=null;
  nos.style.display='';edf.classList.remove('vis');
  idc=data.idc||0;
  (data.stickies||[]).forEach(s=>{ST.push(s);makeEl(s);});
  LN=data.lines||[];
  renderLines();
  remoteUpdate=false;
}

function pushToFirebase(){
  return set(boardDataRef(curBoardId),{stickies:ST.map(s=>({...s})),lines:LN.map(l=>({...l})),idc,ts:Date.now()})
    .then(()=>{setSyncState('ok');saveLocal(curBoardId);})
    .catch(()=>setSyncState('err'));
}

function scheduleSave(){
  if(remoteUpdate)return;
  setSyncState('sync');
  saveLocal(curBoardId);
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    if(navigator.onLine)pushToFirebase();
    else setSyncState('err');
  },800);
}

let fbLoaded=false;
function loadBoard(bid){
  // 前のリスナー解除
  if(boardUnsub){boardUnsub();boardUnsub=null;}
  fbLoaded=false;
  document.getElementById('board-name-lbl').textContent=boards[bid]?.name||bid;
  boardUnsub=onValue(boardDataRef(bid),snap=>{
    const fbData=snap.val();
    if(!fbData){
      const local=getLocalData(bid);
      if(local)loadData(local);else loadData({stickies:[],lines:[],idc:0});
      setSyncState('ok');fbLoaded=true;return;
    }
    const local=getLocalData(bid);
    if(local&&local.ts&&fbData.ts&&local.ts>fbData.ts&&!fbLoaded){
      loadData(local);pushToFirebase();
    }else{
      loadData(fbData);saveLocal(bid);setSyncState('ok');
    }
    fbLoaded=true;
  });
}

window.addEventListener('online',()=>{
  setSyncState('sync');
  const local=getLocalData(curBoardId);
  if(local){
    get(boardDataRef(curBoardId)).then(snap=>{
      const fbData=snap.val();
      if(!fbData||(local.ts&&fbData.ts&&local.ts>fbData.ts)){loadData(local);pushToFirebase();}
      else{loadData(fbData);saveLocal(curBoardId);setSyncState('ok');}
    }).catch(()=>{loadData(local);pushToFirebase();});
  }
});
window.addEventListener('offline',()=>{setSyncState('err');syncLbl.textContent='オフライン（ローカル保存中）';});

// メタデータ初期化
function initBoards(){
  const local=loadMetaLocal();
  onValue(metaRef(),snap=>{
    const fbMeta=snap.val();
    if(fbMeta){
      boards=fbMeta;
      if(!boards[curBoardId])curBoardId=Object.keys(boards)[0];
    }else if(local){
      boards=local;
      if(!boards[curBoardId])curBoardId=Object.keys(boards)[0];
      saveMeta();
    }else{
      boards={default:{name:'ボード1',ts:Date.now()}};
      curBoardId='default';saveMeta();
    }
    renderBoardList();
    loadBoard(curBoardId);
  },{onlyOnce:true});
}

// ===== ズーム・パン =====
function applyT(){brd.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;document.getElementById('zlbl').textContent=Math.round(zoom*100)+'%';drawGrid();renderLines();}
function setZoom(z,cx,cy){const r=ba.getBoundingClientRect();const ox=cx!=null?cx-r.left:r.width/2,oy=cy!=null?cy-r.top:r.height/2;const nz=Math.min(3,Math.max(0.15,z));panX=ox-(ox-panX)*(nz/zoom);panY=oy-(oy-panY)*(nz/zoom);zoom=nz;applyT();}
function drawGrid(){const cv=document.getElementById('gcvs');const r=ba.getBoundingClientRect();cv.width=r.width||700;cv.height=r.height||640;const ctx=cv.getContext('2d');ctx.clearRect(0,0,cv.width,cv.height);const step=24*zoom,ox=((panX%step)+step)%step,oy=((panY%step)+step)%step;ctx.strokeStyle='rgba(45,90,61,0.14)';ctx.lineWidth=0.7;for(let x=ox-step;x<cv.width+step;x+=step){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,cv.height);ctx.stroke();}for(let y=oy-step;y<cv.height+step;y+=step){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cv.width,y);ctx.stroke();}}
document.getElementById('bzi').addEventListener('click',()=>setZoom(zoom+0.1));
document.getElementById('bzo').addEventListener('click',()=>setZoom(zoom-0.1));
document.getElementById('bzr').addEventListener('click',()=>{zoom=1;panX=0;panY=0;applyT();});
ba.addEventListener('wheel',e=>{e.preventDefault();if(e.ctrlKey){setZoom(zoom*(e.deltaY<0?1.04:0.96),e.clientX,e.clientY);}else{panX-=e.deltaX;panY-=e.deltaY;applyT();}},{passive:false});

// ===== タッチ操作 =====
let touches={},lastDist=0,touchStartPos={},touchDragId=null,touchDragOffX=0,touchDragOffY=0,touchDragMoved=false;
function isBgEl(el){if(!el)return true;return el===ba||el===brd||el.id==='gcvs'||el.id==='svgl'||el.tagName==='svg'||el.tagName==='line'||el.tagName==='g';}
document.addEventListener('touchstart',e=>{
  if(e.touches.length>=2){e.preventDefault();touchDragId=null;Array.from(e.changedTouches).forEach(t=>{touches[t.identifier]={x:t.clientX,y:t.clientY};});return;}
  const t=e.changedTouches[0];touches[t.identifier]={x:t.clientX,y:t.clientY};touchStartPos[t.identifier]={x:t.clientX,y:t.clientY};
  const el=document.elementFromPoint(t.clientX,t.clientY);
  const sw=el?.closest('.sw');
  if(sw&&!conMode&&!eraseMode){const id=parseInt(sw.id.replace('w',''));const s=ST.find(x=>x.id===id);if(s){touchDragId=id;touchDragOffX=t.clientX/zoom-panX/zoom-s.x;touchDragOffY=t.clientY/zoom-panY/zoom-s.y;touchDragMoved=false;}}else{touchDragId=null;}
},{passive:false});
document.addEventListener('touchmove',e=>{
  if(e.touches.length===2){e.preventDefault();const t0=e.touches[0],t1=e.touches[1];const dist=Math.hypot(t1.clientX-t0.clientX,t1.clientY-t0.clientY);const cx=(t0.clientX+t1.clientX)/2,cy=(t0.clientY+t1.clientY)/2;if(lastDist>0)setZoom(zoom*(dist/lastDist),cx,cy);lastDist=dist;return;}
  if(e.touches.length!==1)return;
  const t=e.touches[0];const prev=touches[t.identifier];if(!prev)return;
  const dx=t.clientX-prev.x,dy=t.clientY-prev.y;touches[t.identifier]={x:t.clientX,y:t.clientY};
  if(touchDragId!==null){e.preventDefault();if(Math.abs(dx)>2||Math.abs(dy)>2)touchDragMoved=true;const s=ST.find(x=>x.id===touchDragId);const wrap=document.getElementById('w'+touchDragId);if(s&&wrap){s.x=t.clientX/zoom-panX/zoom-touchDragOffX;s.y=t.clientY/zoom-panY/zoom-touchDragOffY;wrap.style.left=s.x+'px';wrap.style.top=s.y+'px';renderLines();}return;}
  const el=document.elementFromPoint(t.clientX,t.clientY);if(isBgEl(el)){e.preventDefault();panX+=dx;panY+=dy;applyT();}
},{passive:false});
document.addEventListener('touchend',e=>{
  Array.from(e.changedTouches).forEach(t=>delete touches[t.identifier]);
  if(Object.keys(touches).length<2)lastDist=0;
  if(e.changedTouches.length!==1||e.touches.length!==0)return;
  const t=e.changedTouches[0];const startPos=touchStartPos[t.identifier]||{x:t.clientX,y:t.clientY};delete touchStartPos[t.identifier];
  if(touchDragId!==null){if(touchDragMoved)scheduleSave();const dragId=touchDragId;touchDragId=null;if(touchDragMoved)return;if(conMode){handleCon(dragId);}else{openEd(dragId);}return;}
  const moved=Math.hypot(t.clientX-startPos.x,t.clientY-startPos.y)>8;if(moved)return;
  const el=document.elementFromPoint(t.clientX,t.clientY);if(!el)return;
  if(el.classList.contains('dlb')){const sw2=el.closest('.sw');if(sw2)remS(parseInt(sw2.id.replace('w','')));return;}
  const lso=el.closest('.ls-opt');if(lso){e.preventDefault();setLS(lso.dataset.ls);return;}
  const lsb=el.closest('#ls-btn');if(lsb){e.preventDefault();lsDropdown.classList.toggle('open');return;}
  const colorAdd=el.closest('#color-add-btn');if(colorAdd){e.preventDefault();colorPickerInp.click();return;}
  const cb=el.closest('.cbtn');if(cb){e.preventDefault();selectColor(cb.dataset.c);return;}
  const tbb=el.closest('.tb-b');if(tbb){e.preventDefault();tbb.click();return;}
  const zmb=el.closest('.zm-b');if(zmb){e.preventDefault();zmb.click();return;}
  const togEl=el.closest('#tog');if(togEl){e.preventDefault();togEl.click();return;}
  const bsBtn=el.closest('#board-sel-btn');if(bsBtn){e.preventDefault();document.getElementById('board-dropdown').classList.toggle('open');return;}
  const bOpt=el.closest('.board-opt');if(bOpt){e.preventDefault();const bid=Object.entries(boards).find(([,v])=>(v.name===bOpt.querySelector('span')?.textContent))?.[0];if(bid)switchBoard(bid);return;}
  const bNewBtn=el.closest('#board-new-btn');if(bNewBtn){e.preventDefault();const inp=document.getElementById('board-new-input');if(inp.value.trim())addBoard(inp.value);inp.value='';return;}
  const dlgBtn=el.closest('.dlg-btn');if(dlgBtn){e.preventDefault();dlgBtn.click();return;}
},{passive:false});

function startPan(e){ba.style.cursor='grabbing';const sx=e.clientX-panX,sy=e.clientY-panY;const onMove=ev=>{panX=ev.clientX-sx;panY=ev.clientY-sy;applyT();};const onUp=()=>{ba.style.cursor='default';window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);};window.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);}

function updEl(s){

  const c=getColDef(s.color);inn.style.background=c.bg;
  const bar=inn.querySelector('.stb');bar.style.background=c.bar;bar.style.color=c.tx;bar.querySelector('span').textContent=s.title||'（無題）';

  const wrap=document.createElement('div');wrap.className='sw';wrap.id='w'+s.id;wrap.style.cssText=`left:${s.x}px;top:${s.y}px;width:${s.w}px;height:${s.h}px`;
  const c=getColDef(s.color);

  bar.appendChild(tsp);bar.appendChild(db);

let addSTimer=0;
function addS(){const now=Date.now();if(now-addSTimer<400)return;addSTimer=now;const r=ba.getBoundingClientRect();const bx=(r.width/2-panX)/zoom+Math.random()*50-25,by=(r.height/2-panY)/zoom+Math.random()*40-20;const s={id:++idc,x:bx,y:by,w:150,h:100,title:'',scene:'',body:'',color:selCol};ST.push(s);makeEl(s);openEd(s.id);scheduleSave();}
function remS(id){ST=ST.filter(s=>s.id!==id);LN=LN.filter(l=>l.f!==id&&l.t!==id);document.getElementById('w'+id)?.remove();if(selId===id){selId=null;edf.classList.remove('vis');nos.style.display='';}renderLines();scheduleSave();}
function onWMD(e,id){if(e.target.classList.contains('dlb'))return;if(e.target.classList.contains('rh'))return;if(conMode){e.preventDefault();handleCon(id);return;}if(eraseMode)return;e.preventDefault();openEd(id);const s=ST.find(x=>x.id===id);const wrap=document.getElementById('w'+id);const offX=e.clientX/zoom-panX/zoom-s.x,offY=e.clientY/zoom-panY/zoom-s.y;wrap.style.zIndex=50;const onMove=ev=>{s.x=ev.clientX/zoom-panX/zoom-offX;s.y=ev.clientY/zoom-panY/zoom-offY;wrap.style.left=s.x+'px';wrap.style.top=s.y+'px';renderLines();};const onUp=()=>{wrap.style.zIndex=10;scheduleSave();window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);};window.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);}
function onRMD(e,id){e.stopPropagation();e.preventDefault();const s=ST.find(x=>x.id===id);const wrap=document.getElementById('w'+id);const sx=e.clientX,sy=e.clientY,sw=s.w,sh=s.h;const onMove=ev=>{s.w=Math.max(110,sw+(ev.clientX-sx)/zoom);s.h=Math.max(70,sh+(ev.clientY-sy)/zoom);wrap.style.width=s.w+'px';wrap.style.height=s.h+'px';renderLines();};const onUp=()=>{scheduleSave();window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);};window.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);}

// ===== 線描画 =====
function ctr(id){const s=ST.find(x=>x.id===id);if(!s)return null;return{x:s.x*zoom+panX+s.w*zoom/2,y:s.y*zoom+panY+s.h*zoom/2};}
function lAttr(ls){if(ls==='dashed')return{da:'7,5',w:'1.5',mk:'arr'};if(ls==='thick')return{da:'none',w:'3.5',mk:'arr2'};return{da:'none',w:'1.5',mk:'arr'};}
function renderLines(){svgLn.innerHTML='';LN.forEach((l,idx)=>{const a=ctr(l.f),b=ctr(l.t);if(!a||!b)return;const at=lAttr(l.s||'solid');const g=document.createElementNS('http://www.w3.org/2000/svg','g');const vis=document.createElementNS('http://www.w3.org/2000/svg','line');vis.setAttribute('x1',a.x);vis.setAttribute('y1',a.y);vis.setAttribute('x2',b.x);vis.setAttribute('y2',b.y);vis.setAttribute('stroke','#2d5a3d');vis.setAttribute('stroke-width',at.w);if(at.da!=='none')vis.setAttribute('stroke-dasharray',at.da);vis.setAttribute('marker-end',`url(#${at.mk})`);const hit=document.createElementNS('http://www.w3.org/2000/svg','line');hit.setAttribute('x1',a.x);hit.setAttribute('y1',a.y);hit.setAttribute('x2',b.x);hit.setAttribute('y2',b.y);hit.setAttribute('stroke','transparent');hit.setAttribute('stroke-width','12');hit.style.cursor='pointer';hit.addEventListener('mouseenter',()=>{if(eraseMode)vis.setAttribute('stroke','#e05030');});hit.addEventListener('mouseleave',()=>{if(eraseMode)vis.setAttribute('stroke','#2d5a3d');});hit.addEventListener('click',()=>{if(eraseMode){LN.splice(idx,1);renderLines();scheduleSave();}});g.appendChild(vis);g.appendChild(hit);svgLn.appendChild(g);});}
function handleCon(id){if(!conFrom){conFrom=id;document.getElementById('w'+id)?.classList.add('sel');}else if(conFrom===id){document.getElementById('w'+id)?.classList.remove('sel');conFrom=null;}else{const existing=LN.findIndex(l=>(l.f===conFrom&&l.t===id)||(l.f===id&&l.t===conFrom));if(existing>=0){if(LN[existing].s!==curLS)LN[existing].s=curLS;}else LN.push({f:conFrom,t:id,s:curLS});document.getElementById('w'+conFrom)?.classList.remove('sel');conFrom=null;renderLines();scheduleSave();}}

document.getElementById('badd').addEventListener('click',addS);
ba.addEventListener('mousemove',e=>{if(conMode&&conFrom){const c=ctr(conFrom);const r=ba.getBoundingClientRect();pvl.style.display='';pvl.setAttribute('x1',c.x);pvl.setAttribute('y1',c.y);pvl.setAttribute('x2',e.clientX-r.left);pvl.setAttribute('y2',e.clientY-r.top);}else{pvl.style.display='none';}});

// ===== 初期化 =====
customColors=loadCustomColors();
renderColorBtns();
drawGrid();
initBoards();
</script>
